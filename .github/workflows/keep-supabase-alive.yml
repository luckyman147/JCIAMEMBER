name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to keep alive
        run: |
          curl -s -o /dev/null -w "%{http_code}" "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/activities?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}"
